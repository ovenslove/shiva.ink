name: Auto Release

on:
  push:
    branches:
      - master
    # 排除 CHANGELOG.md 和 package.json 的变动，防止无限循环
    paths-ignore:
      - 'CHANGELOG.md'
      - 'package.json'
      - 'public/version.json'
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  auto-release:
    runs-on: ubuntu-latest
    # 严格排除发布提交，防止循环
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 使用持久化的认证
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Determine Release Type
        id: release_type
        shell: bash
        run: |
          # 获取分支名称
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          else
            # 尝试从合并 commit 信息中解析分支
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            BRANCH_NAME=$(echo "$COMMIT_MSG" | grep -oE "from [^/]+/[^ ]+" | cut -d'/' -f2 || echo "master")
          fi
          
          echo "Analyzing branch: $BRANCH_NAME"
          
          TYPE="patch"
          if [[ "$BRANCH_NAME" =~ ^feature/ ]]; then
            TYPE="minor"
          elif [[ "$BRANCH_NAME" =~ ^bugfix/ ]] || [[ "$BRANCH_NAME" =~ ^hotfix/ ]]; then
            TYPE="patch"
          elif [[ "$BRANCH_NAME" =~ ^release/ ]]; then
            TYPE="major"
          fi
          
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Create Release
        env:
          RELEASE_TYPE: ${{ steps.release_type.outputs.type }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Executing release for type: $RELEASE_TYPE"
          
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            # 1. 强制清理工作区并确保是远程最新 master
            git fetch origin master
            git reset --hard origin/master
            
            # 2. 执行发布（这会修改版本号并提交 commit）
            npm run release -- --release-as $RELEASE_TYPE
            
            # 3. 推送变更
            # 由于我们已经重置到了 origin/master 且刚创建了唯一的 release commit，
            # 这里直接推送即可，不需要再 pull
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" master --follow-tags
          else
            # PR 阶段
            git fetch origin ${{ github.event.pull_request.head.ref }}
            git reset --hard origin/${{ github.event.pull_request.head.ref }}
            
            npm run release -- --release-as $RELEASE_TYPE --skip.tag
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Handle Errors
        if: failure()
        run: |
          echo "Auto release failed. Common causes: branch naming or permission issues."
          exit 1
